<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dominion Black | Plataforma de negociação online</title>
    <meta
      name="description"
      content="Dominion Black é uma plataforma de negociação online com cadastro rápido, área do cliente, acesso em computador e celular e pagamentos via Pix."
    />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Dominion Black" />
    <meta name="application-name" content="Dominion Black" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://dominionblack.com/" />

    <!-- Open Graph -->
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dominion Black" />
    <meta property="og:title" content="Dominion Black | Plataforma de negociação online" />
    <meta
      property="og:description"
      content="Acesse a Dominion Black, plataforma de negociação online com interface moderna, área do cliente e pagamentos via Pix."
    />
    <meta property="og:url" content="https://dominionblack.com/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dominion Black | Plataforma de negociação online" />
    <meta
      name="twitter:description"
      content="Plataforma de negociação online com cadastro rápido, acesso em computador e celular e pagamentos via Pix."
    />

    <!-- Nome do site para mecanismos de busca -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Dominion Black",
        "alternateName": "DominionBlack",
        "url": "https://dominionblack.com/"
      }
    </script>

    <!-- FAQ estruturado -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Como faço para abrir uma conta na Dominion Black?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Basta acessar a página de cadastro, preencher seus dados e concluir a criação da conta."
            }
          },
          {
            "@type": "Question",
            "name": "Qual é o valor mínimo para depósito e retirada?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Os valores mínimos podem ser consultados diretamente na plataforma ou na área do cliente."
            }
          }
        ]
      }
    </script>

    <script>
      (function () {
        var isProdHost =
          location.hostname === "dominionblack.com" ||
          location.hostname === "www.dominionblack.com";

        if (!isProdHost) return;

        var noop = function () {};

        console.log = noop;
        console.info = noop;
        console.warn = noop;
        console.debug = noop;
        console.error = noop;
      })();
    </script>
  </head>
  <body>
    <!-- App principal -->
    <div id="root"></div>
